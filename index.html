<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>YURI_LOVE_COUNTER_v1.0</title>
    <style>
        :root {
            --hacker-green: #00ff41;
            --sakura-pink: #ff85a1;
            --heart-red: #ff3e6c;
            --cyber-blue: #00f2ff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            /* かわいい丸文字系のフォント指定 */
            font-family: "Hiragino Maru Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
            color: #fff;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* 累積カウント表示（ハッカー端末風） */
        #counter-display {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            border-left: 5px solid var(--sakura-pink);
            padding: 10px 20px;
            font-size: 14px;
            color: var(--sakura-pink);
            box-shadow: 0 0 15px rgba(255, 133, 161, 0.4);
        }

        #count-num {
            font-size: 28px;
            font-weight: 900;
            display: block;
            color: #fff;
            text-shadow: 0 0 10px var(--sakura-pink);
        }

        /* センターユニット */
        #frame {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            max-width: 380px;
            aspect-ratio: 3/4;
            z-index: 10;
            border: 4px solid var(--hacker-green);
            background: #000;
            overflow: hidden;
            cursor: pointer;
            animation: glitch-frame 0.2s infinite;
        }

        #frame img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: contrast(1.2);
        }

        /* 賛辞パネル：読みやすい「かわいい」フォント */
        #compliment-panel {
            position: absolute;
            bottom: 40px; left: 0; width: 100%;
            z-index: 30;
            text-align: center;
            font-weight: 900;
            font-size: 6.5vw;
            line-height: 1.4;
            color: #fff;
            background: rgba(255, 62, 108, 0.2);
            backdrop-filter: blur(5px);
            padding: 15px 0;
            border-top: 3px solid var(--heart-red);
            border-bottom: 3px solid var(--heart-red);
            display: none; /* タップで解放 */
        }

        .compliment-main {
            text-shadow: 2px 2px 0 var(--heart-red), -1px -1px 0 #000;
        }

        #signature {
            position: absolute;
            bottom: 10px; right: 10px;
            z-index: 20;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* アニメーション */
        @keyframes glitch-frame {
            0%, 100% { transform: translate(-50%, -50%) skew(0deg); }
            50% { transform: translate(-50%, -51%) skew(1deg); }
        }

        @media (min-width: 768px) {
            #compliment-panel { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div id="counter-display">
        LOVE_LOG_STORAGE
        <span id="count-num">000000</span>
    </div>

    <canvas id="canvas"></canvas>

    <div id="signature">SYSTEM DESIGNED BY DAICHI</div>

    <div id="frame" onclick="addHeart(event)">
        <img src="yuri_photo.jpg" alt="Critical_Asset: Yuri">
    </div>

    <div id="compliment-panel">
        <div class="compliment-main">この5年でみた女性の中で</div>
        <div class="compliment-main">一番かわいい。ッ！！！</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const countDisplay = document.getElementById('count-num');
        const compliment = document.getElementById('compliment-panel');

        let loveCount = 0;
        let elements = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // ハートクラス
        class Heart {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 20 + 20;
                this.vX = (Math.random() - 0.5) * 10;
                this.vY = -Math.random() * 10 - 5;
                this.opacity = 1;
                this.gravity = 0.2;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#ff3e6c';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.bezierCurveTo(this.x - this.size/2, this.y - this.size/2, this.x - this.size, this.y + this.size/3, this.x, this.y + this.size);
                ctx.bezierCurveTo(this.x + this.size, this.y + this.size/3, this.x + this.size/2, this.y - this.size/2, this.x, this.y);
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.x += this.vX;
                this.y += this.vY;
                this.vY += this.gravity;
                this.opacity -= 0.02;
            }
        }

        // タップ時の処理
        function addHeart(e) {
            loveCount++;
            // カウントを6桁表示
            countDisplay.innerText = String(loveCount).padStart(6, '0');
            
            // パネルを表示
            compliment.style.display = 'block';

            // ハート生成
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;
            for(let i=0; i<5; i++) {
                elements.push(new Heart(x, y));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for(let i = elements.length - 1; i >= 0; i--) {
                elements[i].update();
                elements[i].draw();
                if(elements[i].opacity <= 0) elements.splice(i, 1);
            }
            requestAnimationFrame(animate);
        }

        // スマホのタッチ開始でも動作
        document.getElementById('frame').addEventListener('touchstart', (e) => {
            addHeart(e.touches[0]);
        }, {passive: false});

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
