<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TERMINAL_YURI_SYSTEM</title>
    <style>
        :root {
            --hacker-green: #00ff41;
            --sakura-pink: #ff85a1;
            --cyber-blue: #00f2ff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
            color: var(--hacker-green);
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        /* センターユニット（写真） */
        #frame {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            width: 75vw;
            max-width: 350px;
            aspect-ratio: 3/4;
            z-index: 10;
            border: 2px solid var(--sakura-pink);
            box-shadow: 0 0 20px var(--sakura-pink), inset 0 0 10px var(--sakura-pink);
            background: #000;
            overflow: hidden;
            cursor: crosshair;
        }

        #frame img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: contrast(1.1) brightness(0.9);
            opacity: 0.85;
            transition: opacity 0.3s;
        }

        #frame:active img { opacity: 1; }

        /* スキャンライン等のHUD演出 */
        #frame::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* テキスト表示 */
        #info-panel {
            position: absolute;
            bottom: 30px; left: 20px;
            z-index: 20;
            font-size: 12px;
            text-transform: uppercase;
            line-height: 1.5;
            text-shadow: 0 0 5px var(--hacker-green);
        }

        .glitch {
            font-weight: bold;
            font-size: 24px;
            color: var(--sakura-pink);
            text-shadow: 2px 0 var(--cyber-blue), -2px 0 #fff;
            margin-bottom: 5px;
        }

        #signature {
            position: absolute;
            top: 20px; right: 20px;
            z-index: 20;
            font-size: 14px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="signature">PRODUCED BY DAICHI</div>

    <div id="frame">
        <img src="yuri_photo.jpg" alt="Target: Yuri">
    </div>

    <div id="info-panel">
        <div class="glitch">ENCRYPTED_LOVE_v1.0</div>
        <div>STATUS: CONNECTED TO YURI</div>
        <div>LOCATION: NAGANO_NODE_01</div>
        <div>ENCRYPTION: AES-256_HEART</div>
        <div id="coords">COORD: X:0, Y:0</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const frame = document.getElementById('frame');
        const coords = document.getElementById('coords');

        let particles = [];
        const chars = "010101桜愛YURI幸福DAICHI∞Σπ";
        
        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // デジタルな雨（マトリックス風）
        class Drop {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.speed = Math.random() * 5 + 2;
                this.fontSize = Math.random() * 12 + 8;
                this.char = chars[Math.floor(Math.random() * chars.length)];
            }
            draw() {
                ctx.fillStyle = "rgba(255, 133, 161, 0.3)"; // さくら色マトリックス
                ctx.font = this.fontSize + "px monospace";
                ctx.fillText(this.char, this.x, this.y);
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) this.reset();
                if (Math.random() > 0.98) this.char = chars[Math.floor(Math.random() * chars.length)];
            }
        }

        // 数学的タップエフェクト
        class MathRipple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.r = 1;
                this.opacity = 1;
            }
            draw() {
                ctx.strokeStyle = `rgba(0, 242, 255, ${this.opacity})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.stroke();
                
                // 幾何学ライン
                ctx.beginPath();
                ctx.moveTo(this.x - this.r, this.y);
                ctx.lineTo(this.x + this.r, this.y);
                ctx.moveTo(this.x, this.y - this.r);
                ctx.lineTo(this.x, this.y + this.r);
                ctx.stroke();
            }
            update() {
                this.r += 4;
                this.opacity -= 0.02;
            }
        }

        let drops = [];
        let ripples = [];

        function setup() {
            for(let i = 0; i < 60; i++) drops.push(new Drop());
        }

        function animate() {
            ctx.fillStyle = "rgba(5, 5, 5, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drops.forEach(d => { d.update(); d.draw(); });
            
            for(let i = ripples.length-1; i>=0; i--) {
                ripples[i].update();
                ripples[i].draw();
                if(ripples[i].opacity <= 0) ripples.splice(i, 1);
            }

            requestAnimationFrame(animate);
        }

        // インタラクション
        frame.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            createEffect(touch.clientX, touch.clientY);
        });

        frame.addEventListener('mousedown', (e) => {
            createEffect(e.clientX, e.clientY);
        });

        function createEffect(x, y) {
            ripples.push(new MathRipple(x, y));
            coords.innerText = `COORD: X:${Math.floor(x)}, Y:${Math.floor(y)}`;
        }

        window.addEventListener('resize', init);
        init();
        setup();
        animate();
    </script>
</body>
</html>
