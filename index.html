<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>YURI_STABLE_LOG_v3.0</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: "Hiragino Maru Gothic ProN", sans-serif;
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        /* ステータス表示 */
        #hud {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            color: #00f2ff; font-size: 12px; background: rgba(0,0,0,0.7);
            padding: 10px; border-left: 3px solid #ff85a1;
        }
        #count-num { font-size: 30px; color: #fff; display: block; font-family: monospace; }

        /* メイン写真 */
        #center-ui {
            position: absolute; top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85vw; max-width: 350px; aspect-ratio: 3/4;
            z-index: 10; border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255,133,161,0.5);
            background: #222; overflow: hidden;
        }
        #center-ui img { width: 100%; height: 100%; object-fit: cover; }

        /* メッセージ */
        #msg {
            position: absolute; bottom: 40px; width: 100%;
            text-align: center; z-index: 30; color: #fff;
            font-weight: bold; font-size: 1.5rem; line-height: 1.5;
            text-shadow: 2px 2px 10px #ff3e6c;
        }
    </style>
</head>
<body>

<div id="hud">
    DATA_STORAGE: ACTIVE
    <span id="count-num">000000</span>
</div>

<div id="center-ui" id="photo-frame">
    <img src="yuri_photo.jpg" alt="Yuri" onerror="this.style.display='none'; alert('画像(yuri_photo.jpg)が見つかりません！')">
</div>

<div id="msg">
    この5年でみた女性の中で<br>
    一番かわいい。ッ！！！
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const countEl = document.getElementById('count-num');
    let loveCount = 0;

    // --- 安全なストレージ機能 ---
    try {
        loveCount = parseInt(localStorage.getItem('yuri_count')) || 0;
    } catch(e) {
        console.log("Storage access denied");
    }
    updateDisplay();

    function updateDisplay() {
        countEl.innerText = String(loveCount).padStart(6, '0');
    }

    // --- エフェクト ---
    let hearts = [];
    class Heart {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.s = Math.random() * 20 + 15;
            this.vx = (Math.random() - 0.5) * 10;
            this.vy = -Math.random() * 15 - 5;
            this.o = 1;
        }
        draw() {
            ctx.globalAlpha = this.o;
            ctx.fillStyle = '#ff3e6c';
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.bezierCurveTo(this.x-this.s, this.y-this.s, this.x-this.s*1.5, this.y+this.s/2, this.x, this.y+this.s);
            ctx.bezierCurveTo(this.x+this.s*1.5, this.y+this.s/2, this.x+this.s, this.y-this.s, this.x, this.y);
            ctx.fill();
        }
    }

    function tap(e) {
        loveCount++;
        updateDisplay();
        try { localStorage.setItem('yuri_count', loveCount); } catch(e) {}

        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        for(let i=0; i<5; i++) hearts.push(new Heart(x, y));
    }

    // 画面全体をタップ可能に
    window.addEventListener('mousedown', tap);
    window.addEventListener('touchstart', (e) => { tap(e); e.preventDefault(); }, {passive: false});

    function anim() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        for(let i=hearts.length-1; i>=0; i--) {
            let h = hearts[i];
            h.x += h.vx; h.y += h.vy; h.vy += 0.5; h.o -= 0.02;
            h.draw();
            if(h.o <= 0) hearts.splice(i, 1);
        }
        requestAnimationFrame(anim);
    }
    anim();
</script>

</body>
</html>
